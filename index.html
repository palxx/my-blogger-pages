<title>Target vs. Achieved Return — Bar View (Fine-tuned Checkpoints)</title>
<style>
  .viz-root {
    color-scheme: light;
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --grid:           #e1e0d9;
    --baseline:       #c3c2b7;
    --target:         #2a78d6;
    --achieved:       #1baf7a;
    --border:         rgba(11,11,11,0.10);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page);
    color: var(--text-primary);
    padding: 32px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) .viz-root {
      color-scheme: dark;
      --surface-1:      #1a1a19;
      --page:           #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --grid:           #2c2c2a;
      --baseline:       #383835;
      --target:         #3987e5;
      --achieved:       #199e70;
      --border:         rgba(255,255,255,0.10);
    }
  }
  :root[data-theme="dark"] .viz-root {
    color-scheme: dark;
    --surface-1:      #1a1a19;
    --page:           #0d0d0d;
    --text-primary:   #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted:     #898781;
    --grid:           #2c2c2a;
    --baseline:       #383835;
    --target:         #3987e5;
    --achieved:       #199e70;
    --border:         rgba(255,255,255,0.10);
  }

  .card {
    max-width: 860px;
    margin: 0 auto;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px 24px;
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 2px; }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin: 0 0 18px; }

  .legend { display: flex; gap: 20px; margin-bottom: 8px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--text-secondary); }
  .swatch { width: 10px; height: 10px; border-radius: 2px; flex: none; }
  .swatch.target { background: var(--target); }
  .swatch.achieved { background: var(--achieved); }

  .panel { margin-top: 22px; }
  .panel-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .panel-sub { font-size: 11.5px; color: var(--text-muted); margin-bottom: 6px; }

  svg { width: 100%; height: auto; display: block; overflow: visible; }
  .grid-line { stroke: var(--grid); stroke-width: 1; }
  .zero-line { stroke: var(--baseline); stroke-width: 1.5; }
  .tick-label { fill: var(--text-muted); font-size: 10px; font-variant-numeric: tabular-nums; }
  .cat-label { fill: var(--text-secondary); font-size: 11px; }
  .val-label { fill: var(--text-secondary); font-size: 10px; font-variant-numeric: tabular-nums; }
</style>

<div class="viz-root">
  <div class="card">
    <h1>Target vs. achieved return — bar view</h1>
    <p class="subtitle">5-episode spot-checks per checkpoint &middot; HalfCheetah-medium-v2 &middot; shared y-axis across panels for direct comparison</p>

    <div class="legend">
      <div class="legend-item"><span class="swatch target"></span>Target return</div>
      <div class="legend-item"><span class="swatch achieved"></span>Achieved return</div>
    </div>

    <div id="panels"></div>
  </div>
</div>

<script>
  const series = {"real_run_aug180": [[0, 9354.772075423316, -12.695282367362092], [1, 12053.921491038634, -6.9015171423704444], [2, 10461.767755528414, 74.72568750881032], [3, 7993.206503653843, -62.66501730678982], [4, 9092.866450062584, 13.896247693290782]], "5m_aug180 (ep28)": [[0, 11465.423245257418, -475.5351898405716], [1, 10180.842458609204, -652.3877629311851], [2, 4063.1965841837264, -534.8683711409146], [3, 8459.72972668951, -419.04393358734285], [4, 3931.187759726554, -295.50803503885544]], "5m_aug180 (ep42)": [[0, 3312.8053990515114, -453.4049007504731], [1, 4462.53607214074, -509.0240431481509], [2, 3076.0230337343714, -539.6326773954099], [3, 6308.784069091371, -472.00016518762095], [4, 6036.115394459161, -504.6620612932872]]};

  const yMin = -700, yMax = 13000;
  const W = 796, H = 220;
  const margin = { top: 10, right: 10, bottom: 30, left: 60 };
  const plotW = W - margin.left - margin.right;
  const plotH = H - margin.top - margin.bottom;
  const yScale = v => margin.top + plotH - (v - yMin) / (yMax - yMin) * plotH;
  const yTicks = [0, 3000, 6000, 9000, 12000];
  const fmt = n => Math.round(n).toLocaleString();

  const svgNS = 'http://www.w3.org/2000/svg';
  const el = (tag, attrs) => {
    const e = document.createElementNS(svgNS, tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  };

  const panelsRoot = document.getElementById('panels');

  Object.entries(series).forEach(([name, rows]) => {
    const panel = document.createElement('div');
    panel.className = 'panel';
    const title = document.createElement('div');
    title.className = 'panel-title';
    title.textContent = name;
    const sub = document.createElement('div');
    sub.className = 'panel-sub';
    const meanAchieved = rows.reduce((s, r) => s + r[2], 0) / rows.length;
    sub.textContent = `mean achieved: ${fmt(meanAchieved)}`;
    panel.appendChild(title);
    panel.appendChild(sub);

    const svg = el('svg', { viewBox: `0 0 ${W} ${H}`, role: 'img', 'aria-label': `Bar chart of target vs achieved return for ${name}` });

    yTicks.forEach(t => {
      const y = yScale(t);
      svg.appendChild(el('line', { class: t === 0 ? 'zero-line' : 'grid-line', x1: margin.left, x2: margin.left + plotW, y1: y, y2: y }));
      const lbl = el('text', { class: 'tick-label', x: margin.left - 8, y: y + 3, 'text-anchor': 'end' });
      lbl.textContent = fmt(t);
      svg.appendChild(lbl);
    });

    const bandW = plotW / rows.length;
    const barW = 18;
    const gap = 2;

    rows.forEach(([ep, target, achieved], i) => {
      const groupCx = margin.left + bandW * i + bandW / 2;
      const y0 = yScale(0);

      const tX = groupCx - barW - gap / 2;
      const tY = yScale(target);
      svg.appendChild(el('rect', { x: tX, y: tY, width: barW, height: Math.max(y0 - tY, 1), fill: 'var(--target)', rx: 3 }));
      const tLbl = el('text', { class: 'val-label', x: tX + barW / 2, y: tY - 5, 'text-anchor': 'middle' });
      tLbl.textContent = fmt(target);
      svg.appendChild(tLbl);

      const aX = groupCx + gap / 2;
      const aY = yScale(Math.max(achieved, 0));
      const aBottom = yScale(Math.min(achieved, 0));
      svg.appendChild(el('rect', { x: aX, y: aY, width: barW, height: Math.max(aBottom - aY, 1), fill: 'var(--achieved)', rx: 3 }));
      const aLbl = el('text', {
        class: 'val-label', x: aX + barW / 2, 'text-anchor': 'middle',
        y: achieved >= 0 ? aY - 5 : aBottom + 12,
      });
      aLbl.textContent = fmt(achieved);
      svg.appendChild(aLbl);

      const catLbl = el('text', { class: 'cat-label', x: groupCx, y: H - 10, 'text-anchor': 'middle' });
      catLbl.textContent = `ep ${ep + 1}`;
      svg.appendChild(catLbl);
    });

    panel.appendChild(svg);
    panelsRoot.appendChild(panel);
  });
</script>
